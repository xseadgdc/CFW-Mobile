name: Deploy to GitHub Pages
on:
  push:
    branches: [ master ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        
      - name: Install and Build
        run: |
          rm -rf ./build/output
          mkdir -p ./build/output/style
          npm install -D tailwindcss @tailwindcss/typography
          cat /home/runner/.npm/_logs/*.log
          dart pub get 
          npx tailwindcss -i ./input.css -o ./build/output/style/tailwind.css --minify
          dart run master.dart build & 
          sleep 120
          kill $(jobs -p) || true
          if [ ! -f ./build/output/index.html ]; then
             echo "index.html not found, checking for alternatives..."
             ls -R ./build/output
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/output 
#         publish_dir: ./output 
